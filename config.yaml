# A股量化辅助决策模型 - 配置文件

data:
  source: akshare
  db_path: data/market.duckdb
  start_date: "20220101"          # 历史数据起始日期

# 股票池筛选
pool:
  min_list_days: 120              # 最少上市天数
  min_daily_amount: 100000000     # 最低日均成交额（1亿）
  exclude_st: true                # 排除 ST
  exclude_price_below: 2.0        # 排除低价股

# 因子参数
factors:
  ma_windows: [5, 20, 60]        # 均线周期
  momentum_window: 20             # 动量/相对强度窗口
  volatility_window: 20           # 波动率窗口
  volume_ma_window: 20            # 成交量均线窗口

# 信号生成
signal:
  top_n: 20                       # 关注池大小
  smooth_days: 3                  # 信号平滑天数（连续N天确认）
  weights:                        # 因子权重
    relative_strength: 0.30       # 相对强度
    trend: 0.25                   # 趋势
    volume_activity: 0.15         # 成交活跃度
    volatility: 0.15              # 低波动
    max_drawdown: 0.15            # 低回撤

# 回测参数
backtest:
  start_date: "20230101"
  end_date: "20261231"
  max_positions: 10               # 最大持仓数
  rebalance_freq: weekly          # 调仓频率
  commission_rate: 0.0003         # 佣金（万三）
  stamp_tax_rate: 0.001           # 印花税（千一，卖出）
  slippage: 0.002                 # 滑点
  stop_loss: -0.08               # 单票止损线

# 大盘/市场
market:
  index_code: "sh000300"          # 基准指数（沪深300）
  breadth_ma_window: 20           # 市场宽度均线窗口
  breadth_threshold_high: 0.60    # 多头阈值
  breadth_threshold_low: 0.30     # 空头阈值

# 价格预测
predict:
  default_look_back: 30             # 默认时间步长（天）
  default_forecast_days: 5          # 默认预测天数

  dl:
    epochs: 100
    batch_size: 32
    early_stop_patience: 10
    lstm_units: [64, 32]
    gru_units: [64, 32]
    cnn_filters: [64, 32]
    cnn_kernel_size: 3
    dropout: 0.2
    learning_rate: 0.001

  stats:
    arima_max_p: 5
    arima_max_q: 5
    arima_max_d: 2
    garch_p: 1
    garch_q: 1
    garch_dist: 't'

  ensemble:
    method: inverse_rmse

  continuous:
    rolling_window: 500
    model_dir: models

  quick_mode:
    epochs: 10
    lstm_units: [16, 8]
    gru_units: [16, 8]
    look_back: 20
    patchtst_d_model: 16
    patchtst_n_encoder_layers: 1
    patchtst_ff_dim: 32
    tft_hidden_size: 8
    tft_lstm_layers: 1

  small_sample:
    threshold: 200
    epochs: 50
    lstm_units: [32, 16]
    gru_units: [32, 16]
    look_back: 20

  patchtst:
    patch_size: 16
    d_model: 128
    n_heads: 4
    n_encoder_layers: 2
    ff_dim: 256
    dropout: 0.1

  tft:
    hidden_size: 64
    n_heads: 4
    dropout: 0.2
    lstm_layers: 1

  fibonacci:
    wave_window: 60
    min_wave_return: 0.05
    min_peak_distance: 10
